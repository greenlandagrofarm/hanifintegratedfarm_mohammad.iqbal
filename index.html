<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRABOARD FACONBACIS - HANIF INTEGRATED FARM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Loader dengan teks Indigo Purple (Ungu Modern) */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Warna Ungu Indigo sesuai tema Ultra */
            color: #4f46e5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            font-weight: 900; /* Dibuat lebih tebal agar tegas */
            text-transform: uppercase; /* Dibuat kapital agar senada dengan UI baru */
            letter-spacing: 0.1em;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="loader">Memuat Aplikasi Mohon Tunggu...</div>
    
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxZEgUSMPeKISHBFQ_vc8MXNivROCAxAlNl3JwGaBadzdDz9M5NCNuqOVWQm6A7k877/exec" 
        onload="document.getElementById('loader').style.display='none';">
    </iframe>
</body>
</html>
